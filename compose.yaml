services:
  fitspin-backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fitspin-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Pull official Buildozer image
        run: docker pull ghcr.io/kivy/buildozer:latest

      - name: Build APK with official Buildozer Docker image
        run: |
          set -o pipefail
          docker run --rm \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            -v "$PWD":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1 | tee buildozer-ci.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitspin-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer-ci.log
          if-no-files-found: warn
